<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#07090F" />
<title>Sin conexión · Quiniela</title>
<style>
  :root {
    --bg: #F4F7FF;
    --fg: #08142B;
    --muted: #3A5C85;
    --primary: #1D6FF2;
    --primary-fg: #ffffff;
    --card: #FFFFFF;
    --border: #C8D8EE;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #07090F;
      --fg: #F0F4FF;
      --muted: #5E7A99;
      --primary: #4D8EFF;
      --primary-fg: #F8FAFF;
      --card: #0C1018;
      --border: rgba(255, 255, 255, 0.07);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .card {
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 28px;
  }
  .ball { font-size: 56px; line-height: 1; }
  h1 { font-size: 22px; margin: 18px 0 8px; letter-spacing: -0.02em; }
  p { margin: 0 0 24px; font-size: 14px; line-height: 1.6; color: var(--muted); }
  button {
    width: 100%;
    border: 0;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    background: var(--primary);
    color: var(--primary-fg);
    cursor: pointer;
    touch-action: manipulation;
  }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>
  <div class="card">
    <div class="ball">⚽</div>
    <h1>Sin conexión</h1>
    <p>No hay internet ahora mismo. Tus predicciones guardadas siguen a salvo: reconecta y vuelve al partido.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
